version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: buergerportal-db
    environment:
      POSTGRES_DB: buergerportal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - buergerportal_data:/var/lib/postgresql/data

volumes:
  buergerportal_data:
